<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarrotDB Cluster</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --acc: #666666;
            --border: #eeeeee;
            --subtle: #f7f7f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, Inter, sans-serif; 
            background: var(--bg); 
            color: var(--fg); 
            line-height: 1.4;
            padding: 3rem;
        }

        .layout { max-width: 1000px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .version { font-size: 0.75rem; color: var(--acc); font-family: monospace; }

        .stats {
            display: flex;
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .stat { display: flex; flex-direction: column; gap: 0.25rem; }
        .stat-label { font-size: 0.7rem; color: var(--acc); text-transform: uppercase; letter-spacing: 0.02em; }
        .stat-value { font-size: 1.25rem; font-weight: 500; font-family: monospace; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .shard-card {
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 4px;
        }

        .shard-id {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .node-list { display: flex; flex-direction: column; gap: 1rem; }

        .node-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .node-info { display: flex; flex-direction: column; gap: 0.2rem; }
        .node-addr { font-family: monospace; color: var(--acc); }
        .node-role { 
            font-size: 0.65rem; 
            font-weight: 700; 
            text-transform: uppercase;
            padding: 0.1rem 0.4rem;
            background: var(--subtle);
            border-radius: 2px;
            width: fit-content;
        }

        .status { display: flex; align-items: center; gap: 0.5rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .online { background: #000; }
        .offline { background: #ff0000; }

        footer {
            margin-top: 4rem;
            font-size: 0.7rem;
            color: var(--acc);
            font-family: monospace;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="layout">
        <header>
            <h1>CarrotDB Cluster</h1>
            <span class="version">v0.11.2</span>
        </header>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">Active Shards</span>
                <span class="stat-value" id="shard-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Total Nodes</span>
                <span class="stat-value" id="node-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">System Uptime</span>
                <span class="stat-value" id="uptime">0%</span>
            </div>
        </div>

        <div class="grid" id="cluster-grid"></div>

        <footer>
            <div id="ts">SYNCING...</div>
        </footer>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const grid = document.getElementById('cluster-grid');
                grid.innerHTML = '';

                let nodeCount = 0;
                let onlineNodes = 0;
                let shardIds = Object.keys(data.shards);

                shardIds.forEach(shardId => {
                    const nodes = data.shards[shardId];
                    const isShardAlive = data.status[shardId];
                    
                    const card = document.createElement('div');
                    card.className = 'shard-card';
                    
                    let nodeHtml = '';
                    nodes.forEach(addr => {
                        nodeCount++;
                        onlineNodes += isShardAlive ? 1 : 0;

                        nodeHtml += `
                            <div class="node-item">
                                <div class="node-info">
                                    <span class="node-addr">${addr}</span>
                                    <span class="node-role">${isShardAlive ? 'Member' : 'Disconnected'}</span>
                                </div>
                                <div class="status">
                                    <div class="dot ${isShardAlive ? 'online' : 'offline'}"></div>
                                </div>
                            </div>
                        `;
                    });

                    card.innerHTML = `
                        <div class="shard-id">
                            <span>${shardId}</span>
                            <span style="font-weight: 400; color: var(--acc); font-size: 0.7rem;">${nodes.length} Nodes</span>
                        </div>
                        <div class="node-list">${nodeHtml}</div>
                    `;
                    grid.appendChild(card);
                });

                document.getElementById('shard-count').textContent = shardIds.length;
                document.getElementById('node-count').textContent = nodeCount;
                document.getElementById('uptime').textContent = `${nodeCount ? Math.round((onlineNodes/nodeCount)*100) : 0}%`;
                document.getElementById('ts').textContent = `LAST_SYNC: ${new Date().toISOString()}`;
            } catch (e) { console.error(e); }
        }
        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
