<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarrotDB Cluster</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --acc: #666666;
            --border: #eeeeee;
            --subtle: #f7f7f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, Inter, sans-serif; 
            background: var(--bg); 
            color: var(--fg); 
            line-height: 1.2;
            padding: 3rem;
        }

        .layout { max-width: 800px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .version { font-size: 0.75rem; color: var(--acc); font-family: monospace; }

        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .stat { display: flex; flex-direction: column; gap: 0.25rem; }
        .stat-label { font-size: 0.7rem; color: var(--acc); text-transform: uppercase; }
        .stat-value { font-size: 1rem; font-weight: 500; font-family: monospace; }

        table { width: 100%; border-collapse: collapse; }
        th { 
            text-align: left; 
            font-size: 0.7rem; 
            color: var(--acc); 
            padding: 0.75rem; 
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }
        td { padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        code { font-family: monospace; font-size: 0.85rem; color: var(--acc); }

        .status { display: flex; align-items: center; gap: 0.5rem; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .online { background: #000; }
        .offline { background: #ff0000; }

        footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: var(--acc);
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="layout">
        <header>
            <h1>CarrotDB Cluster</h1>
            <span class="version">v0.6.0</span>
        </header>

        <div class="stats">
            <div class="stat">
                <span class="stat-label">Nodes</span>
                <span class="stat-value" id="node-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Uptime Score</span>
                <span class="stat-value" id="uptime">0%</span>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Endpoint</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>

        <footer>
            <div id="ts">Updating...</div>
        </footer>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const rows = document.getElementById('rows');
                rows.innerHTML = '';

                let online = 0, total = 0;

                for (const id in data.shards) {
                    total++;
                    if (data.status[id]) online++;
                    
                    const nodes = data.shards[id].join(', ');
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${id}</td>
                        <td><code>${nodes}</code></td>
                        <td>
                            <div class="status">
                                <div class="dot ${data.status[id] ? 'online' : 'offline'}"></div>
                                ${data.status[id] ? 'ONLINE' : 'OFFLINE'}
                            </div>
                        </td>
                    `;
                    rows.appendChild(tr);
                }

                document.getElementById('node-count').textContent = total;
                document.getElementById('uptime').textContent = `${total ? Math.round((online/total)*100) : 0}%`;
                document.getElementById('ts').textContent = `SYNC: ${new Date().toISOString()}`;
            } catch (e) { console.error(e); }
        }
        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
